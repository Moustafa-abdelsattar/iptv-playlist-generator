<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTV Playlist Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>IPTV Playlist Generator</h1>
      <p>Connect to your IPTV server and generate M3U playlists</p>
    </div>

    <!-- Connection -->
    <div class="card">
      <div class="card-title">Server Connection</div>
      <div class="form-group">
        <label>Server URL</label>
        <input type="text" id="serverUrl" placeholder="http://yourserver.com:port">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password">
        </div>
      </div>
      <button class="btn btn-primary" id="connectBtn">Connect to Server</button>
      <div id="connectStatus" class="status"></div>
      <div id="serverInfo" class="server-info hidden"></div>
    </div>

    <!-- Options -->
    <div class="card hidden" id="optionsCard">
      <div class="card-title">Playlist Options</div>
      <div class="cat-controls">
        <button class="btn btn-secondary" id="selectAllBtn">Select All</button>
        <button class="btn btn-secondary" id="deselectAllBtn">Deselect All</button>
        <span class="cat-count" id="catCount"></span>
      </div>
      <div class="categories-grid" id="categoriesGrid"></div>
      <button class="btn btn-primary" id="generateBtn" style="margin-top: 20px;">Generate All Playlists</button>
      <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
      <div id="generateStatus" class="status"></div>
    </div>

    <!-- Results -->
    <div class="card hidden" id="resultCard">
      <div class="card-title">Your Playlists</div>
      <div class="playlist-cards" id="playlistCards"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
